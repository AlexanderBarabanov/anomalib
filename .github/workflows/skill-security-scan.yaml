name: Skill Scanner

on:
  pull_request:
    paths:
      - ".agents/skills/**"
      - ".github/workflows/skill-security-scan.yaml"
  push:
    branches: ["main", "release/**"]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      severity:
        description: "Severity level for PR failure (CRITICAL, HIGH, MEDIUM, LOW)"
        required: false
        default: "CRITICAL"
        type: choice
        options:
          - CRITICAL
          - HIGH
          - MEDIUM
          - LOW

permissions: {}

jobs:
  skill-scan:
    name: SkillSpector Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run SkillSpector scan
        uses: ./.github/actions/skillspector-scan
        with:
          severity-level: ${{ inputs.severity || 'CRITICAL' }}
