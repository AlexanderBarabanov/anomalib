name: Skill Scanner

on:
  push:
    branches: ["main", "release/**"]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions: {} # No permissions by default on workflow level

jobs:
  skill-scan-all:
    name: SkillSpector (all skills)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # SkillSpector is not published to PyPI and cuts no release tags, so we
      # install from a pinned commit SHA
      - name: Install SkillSpector
        run: python -m pip install "git+https://github.com/NVIDIA/SkillSpector.git@a5092dd9b9521ff57a9b53612bb129ce78019002"

      - name: Run SkillSpector on all skills
        run: |
          skillspector scan .agents/skills 
            --no-llm --verbose --format markdown --output skillspector-report.md

      - name: Display report
        if: always()
        run: |
          if [ -f skillspector-report.md ]; then
            cat skillspector-report.md
          else
            echo "SkillSpector Markdown report was not generated."
          fi
      - name: Upload SkillSpector reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: skillspector-reports
          path: skillspector-report.md
          if-no-files-found: error
